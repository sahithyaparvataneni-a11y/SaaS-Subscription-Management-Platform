<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card p-4">

        <h2>Login</h2>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                class="form-control mb-3"
                placeholder="Enter Email"
                required>

            <input
                type="password"
                id="password"
                class="form-control mb-3"
                placeholder="Enter Password"
                required>

            <button
                type="submit"
                class="btn btn-success">

                Login

            </button>

        </form>

        <br>

        <a href="register.html">
            Create New Account
        </a>

    </div>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    try{

        const response =
        await fetch(
            "http://localhost:5000/api/auth/login",
            {
                method: "POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body: JSON.stringify({

                    email,
                    password

                })
            }
        );

        const data =
        await response.json();

        alert(data.message);

        if(data.token){

            localStorage.setItem(
                "token",
                data.token
            );

            localStorage.setItem(
                "user",
                JSON.stringify(data.user)
            );

            window.location.href =
            "plans.html";
        }

    }
    catch(error){

        console.log(error);

        alert("Server Error");
    }

});

</script>

</body>
</html>
