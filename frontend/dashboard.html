<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS User Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="#">
        SaaS Dashboard
    </a>

    <button class="btn btn-danger" onclick="logout()">
        Logout
    </button>
</nav>

<!-- Main Content -->
<div class="container mt-5">

    <h2 id="welcome"></h2>

    <hr>

    <h3 class="mb-4">
        Subscription Plans
    </h3>

    <!-- Add Plan Form -->
    <div class="card p-3 mb-4">

        <h4>Add New Plan</h4>

        <input
            type="text"
            id="planName"
            class="form-control mb-2"
            placeholder="Plan Name">

        <input
            type="text"
            id="planPrice"
            class="form-control mb-2"
            placeholder="Plan Price">

        <button
            class="btn btn-primary"
            onclick="addPlan()">

            Add Plan

        </button>

    </div>

    <!-- Plans Container -->
    <div class="row" id="plansContainer">

    </div>

</div>

<script>

// ==========================
// AUTH CHECK
// ==========================
console.log("Dashboard JS Loaded");
alert("Dashboard Loaded");
document.addEventListener("DOMContentLoaded", function () {

    const token =
        localStorage.getItem("token");

    const user =
        JSON.parse(
            localStorage.getItem("user")
        );

    if (!token) {

        window.location.href =
            "login.html";

        return;
    }

    if (user) {

        document.getElementById(
            "welcome"
        ).innerText =
            "Welcome, " + user.name;
    }

    loadPlans();

});


// ==========================
// AVAILABLE PLANS
// ==========================

const allPlans = {

    Basic: {
        price: "₹199/month",
        features: [
            "1 User",
            "5 Projects",
            "Email Support"
        ]
    },

    Starter: {
        price: "₹299/month",
        features: [
            "3 Users",
            "10 Projects",
            "Basic Analytics"
        ]
    },

    Pro: {
        price: "₹499/month",
        features: [
            "10 Users",
            "Unlimited Projects",
            "Analytics Dashboard"
        ]
    },

    Business: {
        price: "₹699/month",
        features: [
            "25 Users",
            "Advanced Analytics",
            "Priority Support"
        ]
    },

    Premium: {
        price: "₹999/month",
        features: [
            "50 Users",
            "Custom Reports",
            "API Access"
        ]
    },

    Enterprise: {
        price: "₹1499/month",
        features: [
            "Unlimited Users",
            "Advanced Security",
            "Priority Support"
        ]
    }

};


// ==========================
// LOAD SELECTED PLANS
// ==========================

function loadPlans() {

    const container =
        document.getElementById(
            "plansContainer"
        );

    container.innerHTML = "";

const user =
    JSON.parse(
        localStorage.getItem("user")
    );

const selectedPlans =
    JSON.parse(
        localStorage.getItem(
            "selectedPlans_" + user.email
        )
    ) || [];

    if (selectedPlans.length === 0) {

        container.innerHTML = `

        <div class="col-12">

            <div class="alert alert-info">

                No Plans Selected Yet

            </div>

        </div>

        `;

        return;
    }

    selectedPlans.forEach(
        (planName, index) => {

        const plan =
            allPlans[planName];

        if (!plan) return;

        container.innerHTML += `

        <div class="col-md-4">

            <div class="card shadow p-4 mb-4">

                <h3>${planName}</h3>

                <h4 class="text-primary">

                    ${plan.price}

                </h4>

                <ul>

                    ${plan.features
                        .map(
                            feature =>
                            `<li>${feature}</li>`
                        )
                        .join("")}

                </ul>

                <button
                    class="btn btn-danger"
                    onclick="removePlan(${index})">

                    Remove Plan

                </button>

            </div>

        </div>

        `;
    });
}


// ==========================
// REMOVE PLAN
// ==========================

function removePlan(index) {

    let selectedPlans =
        JSON.parse(
            localStorage.getItem(
                "selectedPlans"
            )
        ) || [];

    selectedPlans.splice(index, 1);

    localStorage.setItem(
        "selectedPlans",
        JSON.stringify(selectedPlans)
    );

    loadPlans();
}
// ==========================
// LOGOUT
// ==========================

function logout() {

    localStorage.removeItem(
        "token"
    );

    localStorage.removeItem(
        "user"
    );

    window.location.href =
        "login.html";

}

</script>

</body>
</html>
